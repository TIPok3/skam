<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Честная вебка</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1e1e1e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #2d2d2d;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 100%;
    }
    .warning-box {
      background: #fff3cd;
      color: #333;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: left;
      font-weight: 500;
    }
    video {
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      margin-top: 20px;
      background: #000;
    }
    button {
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn-start { background: #4CAF50; color: white; margin-top: 15px; }
    .btn-start:hover { background: #45a049; }
    .btn-stop { background: #f44336; color: white; margin-top: 10px; }
    .btn-stop:hover { background: #da190b; }
    .id-display {
      background: #222;
      padding: 10px;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      margin: 10px 0;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <!-- Контент будет вставлен JS -->
  </div>

  <!-- Подключаем PeerJS -->
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

  <script>
    (function() {
      // --- Парсим параметры из URL ---
      const params = new URLSearchParams(window.location.search);
      const role = params.get('role');        // 'viewer' или 'sender'
      const targetPeerId = params.get('peer'); // нужен для отправителя

      const app = document.getElementById('app');
      let peer;
      let localStream; // для остановки своей камеры при необходимости

      // --- Вспомогательная функция для остановки камеры ---
      function stopCamera() {
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
          localStream = null;
        }
      }

      // --- Инициализация PeerJS ---
      function initPeer() {
        peer = new Peer(); // используем бесплатный облачный сигнальный сервер

        peer.on('open', (myPeerId) => {
          if (role === 'viewer') {
            renderViewer(myPeerId);
          } else if (role === 'sender' && targetPeerId) {
            renderSender(myPeerId);
          } else {
            showError('Некорректные параметры. Для отправителя нужен ?peer=ID.');
          }
        });

        peer.on('error', (err) => {
          console.error('PeerJS error:', err);
          alert('Ошибка соединения: ' + err.type);
        });
      }

      // --- Интерфейс ЗРИТЕЛЯ (ты) ---
      function renderViewer(myId) {
        app.innerHTML = `
          <h2>🎥 Ты — зритель</h2>
          <p>Твой ID:</p>
          <div class="id-display">${myId}</div>
          <p style="margin-top:15px;">Отправь другу эту ссылку:</p>
          <div class="id-display" style="font-size:14px;">
            ${window.location.origin}${window.location.pathname}?role=sender&peer=${myId}
          </div>
          <p style="margin-top:15px;">Ожидаю подключения...</p>
          <div id="videoContainer"></div>
        `;

        // Когда друг позвонит, принимаем звонок
        peer.on('call', (call) => {
          // Отвечаем без отправки своего видео (односторонняя передача)
          call.answer();
          call.on('stream', (remoteStream) => {
            const container = document.getElementById('videoContainer');
            container.innerHTML = ''; // очищаем
            const video = document.createElement('video');
            video.srcObject = remoteStream;
            video.autoplay = true;
            video.playsInline = true;
            video.controls = false;
            container.appendChild(video);
          });
        });
      }

      // --- Интерфейс ОТПРАВИТЕЛЯ (друг) ---
      function renderSender(myId) {
        // Сохраняем целевой ID
        const target = targetPeerId;

        app.innerHTML = `
          <h2>📡 Трансляция для друга</h2>
          <div class="warning-box">
            <strong>⚠️ Внимание!</strong><br>
            Сейчас будет запрошен доступ к твоей веб-камере.<br>
            Видео будет передаваться напрямую пользователю с ID: <strong>${target}</strong>.<br>
            Ты согласен на это? Нажми кнопку ниже, чтобы начать.
          </div>
          <button class="btn-start" id="startBtn">✅ Да, я согласен, начать трансляцию</button>
          <button class="btn-stop hidden" id="stopBtn">⏹ Остановить</button>
          <div id="localVideoContainer" style="margin-top:20px;">
            <!-- Здесь будет локальное видео (чтобы друг видел себя) -->
          </div>
        `;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        startBtn.addEventListener('click', async () => {
          try {
            // Запрашиваем доступ к веб-камере
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            // Показываем локальное видео (чтобы друг видел себя)
            const localVideo = document.createElement('video');
            localVideo.srcObject = localStream;
            localVideo.autoplay = true;
            localVideo.muted = true;
            localVideo.playsInline = true;
            localVideo.style.maxWidth = '300px';
            document.getElementById('localVideoContainer').appendChild(localVideo);

            // Звоним зрителю с нашим потоком
            const call = peer.call(target, localStream);
            call.on('error', (err) => {
              console.error('Call error:', err);
              alert('Не удалось соединиться. Проверь ID получателя.');
            });

            // Меняем кнопки
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');

            // Если зритель закроет соединение, останавливаем камеру
            call.on('close', () => {
              stopCamera();
              localVideo.remove();
              startBtn.classList.remove('hidden');
              stopBtn.classList.add('hidden');
            });

          } catch (err) {
            console.error('Ошибка доступа к камере:', err);
            alert('Не удалось получить доступ к камере. Разреши использование камеры в браузере.');
          }
        });

        stopBtn.addEventListener('click', () => {
          stopCamera();
          // Удаляем видеоэлементы
          const container = document.getElementById('localVideoContainer');
          container.innerHTML = '';
          // Разрываем все звонки
          if (peer) {
            // PeerJS не даёт простого способа разорвать конкретный звонок,
            // поэтому пересоздадим peer или просто остановим камеру,
            // что разорвёт поток. Для простоты остановим камеру и перезагрузим peer.
            peer.destroy();
            initPeer(); // переинициализируем, чтобы можно было позвонить заново
          }
          startBtn.classList.remove('hidden');
          stopBtn.classList.add('hidden');
        });
      }

      // --- Ошибка ---
      function showError(message) {
        app.innerHTML = `
          <h2>❌ Ошибка</h2>
          <p>${message}</p>
          <p><a href="?role=viewer">Открыть как зритель</a></p>
        `;
      }

      // --- Старт ---
      if (!role) {
        // Если роль не указана, показываем выбор
        app.innerHTML = `
          <h2>📹 Честная вебка-трансляция</h2>
          <p>Выбери режим:</p>
          <a href="?role=viewer" style="display:inline-block;margin:10px;padding:10px 20px;background:#4CAF50;color:white;text-decoration:none;border-radius:5px;">Я зритель (смотреть друга)</a>
          <a href="?role=sender&peer=НУЖЕН_ID" style="display:inline-block;margin:10px;padding:10px 20px;background:#2196F3;color:white;text-decoration:none;border-radius:5px;">Я отправитель (друг)</a>
        `;
      } else {
        initPeer();
      }

      // При уходе со страницы останавливаем камеру
      window.addEventListener('beforeunload', () => {
        stopCamera();
        if (peer) peer.destroy();
      });
    })();
  </script>
</body>
</html>
