<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Честная вебка-трансляция</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1e1e1e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: #2d2d2d;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      max-width: 500px;
      width: 100%;
    }
    .warning-box {
      background: #fff3cd;
      color: #333;
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: left;
      font-weight: 500;
    }
    video {
      width: 100%;
      max-width: 640px;
      border-radius: 12px;
      margin-top: 20px;
      background: #000;
    }
    button {
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn-start { background: #4CAF50; color: white; margin-top: 15px; }
    .btn-start:hover { background: #45a049; }
    .btn-stop { background: #f44336; color: white; margin-top: 10px; }
    .btn-stop:hover { background: #da190b; }
    .id-display {
      background: #222;
      padding: 10px;
      border-radius: 6px;
      font-family: monospace;
      word-break: break-all;
      margin: 10px 0;
    }
    .hidden { display: none; }
    .error { color: #ff6b6b; }
  </style>
</head>
<body>
  <div class="card" id="app">
    <!-- Контент заполняется JS -->
  </div>

  <!-- Подключаем PeerJS с CDN -->
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

  <script>
    (function() {
      // Параметры URL
      const params = new URLSearchParams(window.location.search);
      const role = params.get('role');        // 'viewer' или 'sender'
      const targetPeerId = params.get('peer'); // ID зрителя (для отправителя)

      const app = document.getElementById('app');
      let peer;
      let localStream;
      let currentCall; // чтобы можно было разорвать звонок

      // Функция остановки камеры
      function stopCamera() {
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
          localStream = null;
        }
      }

      // Инициализация PeerJS с резервным сервером
      function initPeer() {
        // Основной сервер PeerJS Cloud
        const primaryConfig = {
          host: '0.peerjs.com',
          port: 443,
          path: '/',
          secure: true,
          debug: 2
        };
        // Резервный публичный сервер (можно заменить на свой)
        const fallbackConfig = {
          host: 'peerjs-server.herokuapp.com',
          port: 443,
          path: '/',
          secure: true,
          debug: 2
        };

        function connectWithConfig(config, isFallback = false) {
          if (peer) {
            peer.destroy();
          }
          peer = new Peer(config);

          peer.on('open', (myPeerId) => {
            console.log('✅ Подключён к', config.host, 'ID:', myPeerId);
            if (role === 'viewer') {
              renderViewer(myPeerId);
            } else if (role === 'sender' && targetPeerId) {
              renderSender(myPeerId);
            } else {
              showError('Некорректные параметры. Для отправителя нужен ?peer=ID.');
            }
          });

          peer.on('error', (err) => {
            console.error('❌ Ошибка PeerJS:', err.type, err);
            if (err.type === 'server-error' && config.host === primaryConfig.host) {
              // Переключаемся на резерв
              console.warn('Основной сервер недоступен, пробую запасной...');
              app.innerHTML = '<p>Проблема с основным сервером, переключаюсь на запасной...</p>';
              connectWithConfig(fallbackConfig, true);
            } else if (err.type === 'peer-unavailable') {
              alert('Пользователь с таким ID не найден. Попроси друга обновить страницу и получить новый ID.');
            } else {
              alert('Ошибка соединения: ' + err.type + '. Попробуйте обновить страницу или проверьте интернет.');
            }
          });

          peer.on('disconnected', () => {
            console.log('Соединение потеряно, пытаюсь переподключиться...');
            peer.reconnect();
          });
        }

        // Стартуем с основного сервера
        connectWithConfig(primaryConfig);
      }

      // --- Интерфейс ЗРИТЕЛЯ (тот, кто смотрит) ---
      function renderViewer(myId) {
        app.innerHTML = `
          <h2>🎥 Ты — зритель</h2>
          <p>Твой ID:</p>
          <div class="id-display">${myId}</div>
          <p style="margin-top:15px;">Отправь другу эту ссылку:</p>
          <div class="id-display" style="font-size:14px;">
            ${window.location.origin}${window.location.pathname}?role=sender&peer=${myId}
          </div>
          <p style="margin-top:15px;">Ожидаю подключения друга...</p>
          <div id="videoContainer"></div>
        `;

        // Принимаем звонок от отправителя
        peer.on('call', (call) => {
          currentCall = call;
          // Отвечаем без своего видео (односторонняя передача)
          call.answer();
          call.on('stream', (remoteStream) => {
            const container = document.getElementById('videoContainer');
            container.innerHTML = '';
            const video = document.createElement('video');
            video.srcObject = remoteStream;
            video.autoplay = true;
            video.playsInline = true;
            video.controls = false;
            container.appendChild(video);
          });
          call.on('close', () => {
            const container = document.getElementById('videoContainer');
            container.innerHTML = '<p>Трансляция завершена.</p>';
          });
          call.on('error', (err) => {
            console.error('Ошибка звонка:', err);
          });
        });
      }

      // --- Интерфейс ОТПРАВИТЕЛЯ (друг, который показывает камеру) ---
      function renderSender(myId) {
        const target = targetPeerId;

        app.innerHTML = `
          <h2>📡 Трансляция для друга</h2>
          <div class="warning-box">
            <strong>⚠️ Полная прозрачность!</strong><br>
            Сейчас будет запрошен доступ к твоей веб-камере.<br>
            Видео будет передаваться напрямую пользователю с ID: <strong>${target}</strong>.<br>
            Ты видишь это предупреждение и можешь отказаться. Нажав кнопку ниже, ты подтверждаешь согласие.
          </div>
          <button class="btn-start" id="startBtn">✅ Да, я согласен, начать трансляцию</button>
          <button class="btn-stop hidden" id="stopBtn">⏹ Остановить</button>
          <div id="localVideoContainer" style="margin-top:20px;"></div>
        `;

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');

        startBtn.addEventListener('click', async () => {
          try {
            // Запрос камеры
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });

            // Показываем локальное видео (друг видит себя)
            const localVideo = document.createElement('video');
            localVideo.srcObject = localStream;
            localVideo.autoplay = true;
            localVideo.muted = true;
            localVideo.playsInline = true;
            localVideo.style.maxWidth = '300px';
            document.getElementById('localVideoContainer').appendChild(localVideo);

            // Звоним зрителю
            currentCall = peer.call(target, localStream);
            currentCall.on('error', (err) => {
              console.error('Ошибка при звонке:', err);
              alert('Не удалось соединиться. Проверь, что друг открыл страницу зрителя и его ID актуален.');
            });
            currentCall.on('close', () => {
              stopCameraAndCleanup();
            });

            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
          } catch (err) {
            console.error('Ошибка доступа к камере:', err);
            alert('Не удалось получить доступ к камере. Разреши использование в браузере.');
          }
        });

        stopBtn.addEventListener('click', () => {
          stopCameraAndCleanup();
        });

        function stopCameraAndCleanup() {
          stopCamera();
          // Останавливаем звонок
          if (currentCall) {
            currentCall.close();
            currentCall = null;
          }
          document.getElementById('localVideoContainer').innerHTML = '';
          startBtn.classList.remove('hidden');
          stopBtn.classList.add('hidden');
        }
      }

      // --- Страница ошибки ---
      function showError(message) {
        app.innerHTML = `
          <h2>❌ Ошибка</h2>
          <p>${message}</p>
          <p><a href="?role=viewer">Открыть как зритель</a> | <a href="?role=sender&peer=ID">Открыть как отправитель (нужен ID)</a></p>
        `;
      }

      // --- Точка входа ---
      if (!role) {
        // Если роль не указана — показываем меню
        app.innerHTML = `
          <h2>📹 Честная вебка-трансляция</h2>
          <p>Выбери режим:</p>
          <a href="?role=viewer" style="display:inline-block;margin:10px;padding:10px 20px;background:#4CAF50;color:white;text-decoration:none;border-radius:5px;">👀 Я зритель (смотреть)</a>
          <a href="?role=sender&peer=НУЖЕН_ID" style="display:inline-block;margin:10px;padding:10px 20px;background:#2196F3;color:white;text-decoration:none;border-radius:5px;">📡 Я отправитель (показывать)</a>
          <p style="margin-top:20px;font-size:14px;color:#aaa;">Ссылка с ID отправителя сгенерируется на странице зрителя.</p>
        `;
      } else {
        initPeer();
      }

      // Очистка при уходе со страницы
      window.addEventListener('beforeunload', () => {
        stopCamera();
        if (peer) peer.destroy();
      });
    })();
  </script>
</body>
</html>
